<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어디갈까 - 한국 여행지 추천</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ── 상단 헤더 ── -->
    <header class="site-header">
        <div class="header-top">
            <div class="logo">
                <img src="logo.svg" alt="어디갈까" class="logo-img">
            </div>
            <div class="header-search">
                <span class="search-icon">🔍</span>
                <div class="search-text">
                    <span class="search-main">어디로 가세요?</span>
                    <span class="search-sep">·</span>
                    <span class="search-sub">월 선택 · 지역 선택</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" aria-label="테마 전환">🌙</button>
            </div>
        </div>

        <!-- ── Airbnb식 월 카테고리 바 ── -->
        <div class="month-bar-outer">
            <div class="month-bar" id="month-tabs"></div>
        </div>
    </header>

    <main>
        <!-- ── 지역 필터 (컴팩트) ── -->
        <div class="region-section">
            <div class="province-row" id="province-row"></div>
            <div class="city-row" id="city-row"></div>
        </div>

        <!-- ── 결과 ── -->
        <section class="results-section">
            <p class="results-summary" id="results-summary"></p>
            <div class="cards-grid" id="cards-grid"></div>
            <div class="empty-state" id="empty-state">
                <span class="empty-icon">🗺️</span>
                <p>해당 조건에 맞는 여행지가 없습니다.</p>
                <p class="empty-sub">다른 월이나 지역을 선택해 보세요!</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <span>© 2024 어디갈까</span>
            <span class="footer-sep">·</span>
            <span>한국 여행의 모든 것</span>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
