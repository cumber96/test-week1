<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#E85520"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0f0f0" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- 배경 (둥근 정사각형) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 지도 핀 (흰색) -->
  <path d="M16 3.5 C10.2 3.5 5.5 8.2 5.5 14 C5.5 21.5 16 28.5 16 28.5 C16 28.5 26.5 21.5 26.5 14 C26.5 8.2 21.8 3.5 16 3.5Z"
        fill="url(#pin)"/>

  <!-- 핀 하이라이트 -->
  <path d="M16 3.5 C10.2 3.5 5.5 8.2 5.5 14 C5.5 9.5 10 5.5 16 5Z"
        fill="white" opacity="0.5"/>

  <!-- 핀 내부 원 (오렌지) -->
  <circle cx="16" cy="14" r="4.2" fill="url(#bg)"/>

  <!-- 내부 원 하이라이트 -->
  <circle cx="14.5" cy="12.5" r="1.2" fill="white" opacity="0.5"/>
</svg>
